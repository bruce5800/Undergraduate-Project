<!DOCTYPE html>
<html>
<head>
    <title>Distributed Diffusion Architecture</title>
    <style>
        body { background: #f8f9fa; margin: 20px; }
        svg { border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">

<!-- 定义组件 -->
<defs>
    <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#6a11cb"/>
        <stop offset="100%" stop-color="#2575fc"/>
    </linearGradient>

    <marker id="d-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#2575fc"/>
    </marker>
</defs>

<!-- 图例 -->
<rect x="20" y="20" width="300" height="180" fill="white" rx="5" stroke="#ddd"/>
<text x="40" y="45" font-size="14">Diffusion Components:</text>
<rect x="40" y="60" width="15" height="15" fill="#6a11cb"/>
<text x="65" y="72">Forward Process</text>
<rect x="40" y="90" width="15" height="15" fill="#2575fc"/>
<text x="65" y="102">Reverse Process</text>
<rect x="40" y="120" width="15" height="15" fill="#2dd4bf"/>
<text x="65" y="132">U-Net Partition</text>
<rect x="40" y="150" width="15" height="15" fill="#ff6b6b"/>
<text x="65" y="162">Scheduler</text>

<!-- 主干架构 -->
<g transform="translate(100,200)">
    <!-- 时间步调度器 -->
    <rect x="600" y="0" width="400" height="80" fill="#ff6b6b" rx="8"/>
    <text x="750" y="45" fill="white" font-size="18">Timestep Scheduler</text>
    
    <!-- 前向扩散过程 -->
    <g transform="translate(0,100)">
        <rect x="200" y="0" width="1200" height="400" fill="url(#timeGrad)" rx="8"/>
        <text x="700" y="30" fill="white" font-size="20">Forward Diffusion Process</text>
        
        <!-- 时间步节点 -->
        <g class="timesteps">
            <rect x="300" y="60" width="200" height="100" fill="#7c3aed" rx="5"/>
            <text x="320" y="110" fill="white">t=1000-800</text>
            <rect x="550" y="60" width="200" height="100" fill="#6366f1" rx="5"/>
            <text x="570" y="110" fill="white">t=800-600</text>
            <rect x="800" y="60" width="200" height="100" fill="#60a5fa" rx="5"/>
            <text x="820" y="110" fill="white">t=600-400</text>
            <rect x="1050" y="60" width="200" height="100" fill="#38bdf8" rx="5"/>
            <text x="1070" y="110" fill="white">t=400-200</text>
        </g>

        <!-- U-Net分解 -->
        <g transform="translate(0,200)">
            <rect x="300" y="0" width="1000" height="160" fill="#2dd4bf" rx="8"/>
            <text x="700" y="30" fill="white">U-Net Distributed Processing</text>
            
            <rect x="350" y="50" width="200" height="80" fill="#059669" rx="5"/>
            <text x="380" y="90" fill="white">Encoder Block</text>
            <rect x="650" y="50" width="200" height="80" fill="#10b981" rx="5"/>
            <text x="680" y="90" fill="white">Bottleneck</text>
            <rect x="950" y="50" width="200" height="80" fill="#34d399" rx="5"/>
            <text x="980" y="90" fill="white">Decoder Block</text>
        </g>
    </g>

    <!-- 反向去噪过程 -->
    <g transform="translate(0,550)">
        <rect x="200" y="0" width="1200" height="400" fill="url(#timeGrad)" rx="8" opacity="0.8"/>
        <text x="700" y="30" fill="white" font-size="20">Reverse Denoising Process</text>
        
        <!-- 反向时间步 -->
        <g class="reverse-timesteps">
            <rect x="300" y="60" width="200" height="100" fill="#60a5fa" rx="5"/>
            <text x="320" y="110" fill="white">t=200-400</text>
            <rect x="550" y="60" width="200" height="100" fill="#6366f1" rx="5"/>
            <text x="570" y="110" fill="white">t=400-600</text>
            <rect x="800" y="60" width="200" height="100" fill="#7c3aed" rx="5"/>
            <text x="820" y="110" fill="white">t=600-800</text>
            <rect x="1050" y="60" width="200" height="100" fill="#6a11cb" rx="5"/>
            <text x="1070" y="110" fill="white">t=800-1000</text>
        </g>
    </g>

    <!-- 连接系统 -->
    <!-- 前向扩散流 -->
    <path d="M800 80 Q800 100 800 200" stroke="#6a11cb" stroke-width="3" marker-end="url(#d-arrow)"/>
    <path d="M800 280 Q800 300 800 400" stroke="#6a11cb" stroke-width="3" marker-end="url(#d-arrow)"/>
    
    <!-- 反向传播流 -->
    <path d="M800 600 Q800 550 800 500" stroke="#2575fc" stroke-width="3" stroke-dasharray="4 2" marker-end="url(#d-arrow)"/>
    
    <!-- 横向梯度同步 -->
    <path d="M300 180 L1100 180" stroke="#10b981" stroke-width="2"/>
    <path d="M300 630 L1100 630" stroke="#10b981" stroke-width="2"/>
</g>

</svg>

<div style="text-align:center; color:#666; margin-top:20px;">
    Diffusion Architecture Features:
    • Timestep-wise Parallelization
    • U-Net Model Partitioning
    • Bidirectional Data Flow
</div>
</body>
</html>
